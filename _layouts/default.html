<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title and page.title != site.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}" />
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="/feed.xml" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.6;
      min-height: 100vh;
    }

    .site-wrapper {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 40px 0 0;
    }

    .nav-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem;
      color: #555;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #111;
    }

    /* Main content */
    main {
      padding: 72px 0 96px;
    }

    /* Sections */
    section {
      margin-bottom: 52px;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 14px;
    }

    p {
      font-size: 0.975rem;
      color: #333;
    }

    /* Links row */
    .links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.875rem;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 1px;
      transition: border-color 0.15s ease;
    }

    .links a:hover {
      border-color: #111;
    }

    /* Project list */
    .project-list {
      list-style: none;
    }

    .project-list li {
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .project-list li:first-child {
      border-top: 1px solid #f0f0f0;
    }

    .project-title {
      font-size: 0.925rem;
      font-weight: 600;
      color: #111;
      text-decoration: none;
    }

    .project-title:hover {
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 3px;
    }

    .project-desc {
      font-size: 0.875rem;
      color: #555;
      margin: 6px 0 8px;
    }

    .project-stack {
      font-size: 0.78rem;
      color: #999;
    }

    /* Blog post list */
    .post-list {
      list-style: none;
    }

    .post-list li {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 20px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .post-list li:first-child {
      border-top: 1px solid #f0f0f0;
    }

    .post-list a {
      font-size: 0.925rem;
      color: #111;
      text-decoration: none;
    }

    .post-list a:hover {
      text-decoration: underline;
      text-decoration-color: #ccc;
      text-underline-offset: 3px;
    }

    .post-date {
      font-size: 0.78rem;
      color: #aaa;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Post content */
    .post-header {
      margin-bottom: 48px;
    }

    .post-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .post-meta {
      font-size: 0.8rem;
      color: #aaa;
    }

    .post-content {
      font-size: 0.975rem;
      color: #333;
    }

    .post-content h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #111;
      margin: 36px 0 12px;
      letter-spacing: -0.01em;
    }

    .post-content h3 {
      font-size: 0.975rem;
      font-weight: 600;
      color: #111;
      margin: 28px 0 10px;
    }

    .post-content p {
      margin-bottom: 18px;
    }

    .post-content a {
      color: #111;
      text-underline-offset: 3px;
    }

    .post-content ul,
    .post-content ol {
      padding-left: 20px;
      margin-bottom: 18px;
    }

    .post-content li {
      margin-bottom: 6px;
      font-size: 0.975rem;
      color: #333;
    }

    .post-content code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.85em;
      background: #f5f5f5;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .post-content pre {
      background: #f5f5f5;
      padding: 18px;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 18px;
    }

    .post-content pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
    }

    .post-content blockquote {
      border-left: 3px solid #e0e0e0;
      padding-left: 18px;
      margin: 24px 0;
      color: #666;
    }

    /* Back link */
    .back-link {
      display: inline-block;
      font-size: 0.825rem;
      color: #999;
      text-decoration: none;
      margin-bottom: 48px;
    }

    .back-link:hover {
      color: #111;
    }

    /* Page title */
    .page-title {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 40px;
    }

    /* Footer */
    footer {
      padding: 32px 0 48px;
      border-top: 1px solid #f0f0f0;
    }

    footer p {
      font-size: 0.78rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="site-wrapper">
    <nav>
      <a href="/" class="nav-name">{{ site.title }}</a>
      <ul class="nav-links">
        <li><a href="/" {% if page.url == '/' %}class="active"{% endif %}>About</a></li>
        <li><a href="/blog" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
      </ul>
    </nav>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}</p>
    </footer>
  </div>
</body>
</html>
