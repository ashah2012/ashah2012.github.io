---
layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abhishek Shah</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #111;
      line-height: 1.6;
      min-height: 100vh;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 96px 24px 96px;
    }

    header {
      margin-bottom: 72px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    section {
      margin-bottom: 52px;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 14px;
    }

    p {
      font-size: 0.975rem;
      color: #333;
    }

    .links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 0.875rem;
      color: #111;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      padding-bottom: 1px;
      transition: border-color 0.15s ease;
    }

    .links a:hover {
      border-color: #111;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Abhishek Shah</h1>
    </header>

    <section>
      <p class="label">About</p>
      <p>Senior Application Developer and designer with 8+ years of experience building and consulting enterprise ecosystems.</p>
    </section>

    <section>
      <p class="label">Contact</p>
      <div class="links">
        <a href="mailto:contact@abhishek-shah.org">Email</a>
        <a href="https://github.com/ashah2012" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/abhishekshah20/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://twitter.com/avishek_20" target="_blank" rel="noopener">Twitter</a>
      </div>
    </section>
  </main>
</body>
</html>
